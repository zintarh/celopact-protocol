[profile.default]
src = "src"
out = "out"
libs = ["lib"]
remappings = [
    "@openzeppelin/=lib/openzeppelin-contracts/",
]
solc_version = "0.8.24"
evm_version = "cancun"
optimizer = true
optimizer_runs = 200

[rpc_endpoints]
celosepolia = "https://forno.celo-sepolia.celo-testnet.org"
celo = "https://forno.celo.org"

[etherscan]
celosepolia = { key = "${BLOCKSCOUT_API_KEY}", url = "https://celo-sepolia.blockscout.com/api" }
celo = { key = "${CELOSCAN_API_KEY}", url = "https://api.celoscan.io/api" }
