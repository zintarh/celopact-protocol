<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 320" fill="none">
  <rect width="400" height="320" rx="20" fill="#faf9f7"/>
  <rect x="0.5" y="0.5" width="399" height="319" rx="19.5" stroke="#e6e4df"/>

  <!-- Requester -->
  <rect x="32" y="56" width="108" height="64" rx="10" fill="#fff" stroke="#d4d2cc" stroke-width="1.25"/>
  <text x="86" y="84" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" font-weight="600" fill="#141413">Requester</text>
  <text x="86" y="102" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#94948f">locks funds</text>

  <!-- Fulfiller -->
  <rect x="260" y="56" width="108" height="64" rx="10" fill="#fff" stroke="#d4d2cc" stroke-width="1.25"/>
  <text x="314" y="84" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" font-weight="600" fill="#141413">Fulfiller</text>
  <text x="314" y="102" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#94948f">delivers work</text>

  <!-- Escrow -->
  <rect x="130" y="148" width="140" height="76" rx="12" fill="#141413"/>
  <rect x="138" y="156" width="124" height="60" rx="8" fill="#1f1f1d"/>
  <circle cx="200" cy="178" r="10" stroke="#3d9b72" stroke-width="1.5" fill="none"/>
  <rect x="196" y="182" width="8" height="7" rx="1" fill="#3d9b72"/>
  <text x="200" y="208" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" font-weight="600" fill="#f2f1ed">Escrow</text>

  <!-- ERC-8004 -->
  <rect x="130" y="256" width="140" height="40" rx="8" fill="#fff" stroke="#e6e4df" stroke-width="1.25"/>
  <text x="200" y="281" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" font-weight="500" fill="#5c5c58">ERC-8004 reputation</text>

  <!-- Arrows -->
  <path d="M 86 120 C 86 134 140 140 165 148" stroke="#c8c6c0" stroke-width="1.25" stroke-linecap="round"/>
  <path d="M 314 120 C 314 134 260 140 235 148" stroke="#c8c6c0" stroke-width="1.25" stroke-linecap="round"/>
  <path d="M 200 224 L 200 256" stroke="#c8c6c0" stroke-width="1.25" stroke-linecap="round" stroke-dasharray="4 4"/>

  <!-- Accent dots -->
  <circle cx="165" cy="148" r="3" fill="#1a6b4a"/>
  <circle cx="235" cy="148" r="3" fill="#1a6b4a"/>
</svg>
