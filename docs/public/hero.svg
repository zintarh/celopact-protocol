<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 380" width="420" height="380">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
      <path d="M0,1 L0,7 L7,4 z" fill="#35D07F"/>
    </marker>
    <marker id="arr2" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
      <path d="M0,1 L0,7 L7,4 z" fill="#2ab870" opacity="0.6"/>
    </marker>
    <linearGradient id="gA" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1c2b1c"/>
      <stop offset="100%" style="stop-color:#0f1f0f"/>
    </linearGradient>
    <linearGradient id="gE" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d2010"/>
      <stop offset="100%" style="stop-color:#071407"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Agent A box -->
  <rect x="10" y="50" width="130" height="72" rx="10" fill="url(#gA)" stroke="#35D07F" stroke-width="1.5"/>
  <text x="75" y="78" text-anchor="middle" font-size="13" font-family="monospace" fill="#35D07F" font-weight="bold">Agent A</text>
  <text x="75" y="96" text-anchor="middle" font-size="10" font-family="monospace" fill="#6aaa88">Requester</text>
  <text x="75" y="112" text-anchor="middle" font-size="9" font-family="monospace" fill="#4a7a5a">locks · pays · disputes</text>

  <!-- Agent B box -->
  <rect x="280" y="50" width="130" height="72" rx="10" fill="url(#gA)" stroke="#35D07F" stroke-width="1.5"/>
  <text x="345" y="78" text-anchor="middle" font-size="13" font-family="monospace" fill="#35D07F" font-weight="bold">Agent B</text>
  <text x="345" y="96" text-anchor="middle" font-size="10" font-family="monospace" fill="#6aaa88">Fulfiller</text>
  <text x="345" y="112" text-anchor="middle" font-size="9" font-family="monospace" fill="#4a7a5a">submits · receives</text>

  <!-- CeloPact Escrow central box -->
  <rect x="135" y="155" width="150" height="90" rx="12" fill="url(#gE)" stroke="#35D07F" stroke-width="2" filter="url(#glow)"/>
  <text x="210" y="185" text-anchor="middle" font-size="11" font-family="monospace" fill="#888">🔒</text>
  <text x="210" y="205" text-anchor="middle" font-size="13" font-family="monospace" fill="#35D07F" font-weight="bold">CeloPact</text>
  <text x="210" y="222" text-anchor="middle" font-size="10" font-family="monospace" fill="#6aaa88">Escrow Contract</text>
  <text x="210" y="237" text-anchor="middle" font-size="8" font-family="monospace" fill="#3a6a4a">Celo Sepolia · verified</text>

  <!-- Oracle box -->
  <rect x="10" y="200" width="110" height="55" rx="8" fill="#0e1a10" stroke="#2ab870" stroke-width="1"/>
  <text x="65" y="224" text-anchor="middle" font-size="11" font-family="monospace" fill="#2ab870" font-weight="bold">Oracle</text>
  <text x="65" y="241" text-anchor="middle" font-size="8" font-family="monospace" fill="#4a7a5a">signs attestation</text>

  <!-- ERC-8004 box -->
  <rect x="135" y="295" width="150" height="60" rx="8" fill="#0a160a" stroke="#2ab870" stroke-width="1"/>
  <text x="210" y="320" text-anchor="middle" font-size="11" font-family="monospace" fill="#2ab870" font-weight="bold">ERC-8004</text>
  <text x="210" y="338" text-anchor="middle" font-size="9" font-family="monospace" fill="#4a7a5a">Identity + Reputation</text>
  <text x="210" y="350" text-anchor="middle" font-size="8" font-family="monospace" fill="#3a5a3a">8004scan.io</text>

  <!-- A -> Escrow: createEscrow -->
  <path d="M 140 90 Q 200 90 185 155" stroke="#35D07F" stroke-width="1.5" fill="none" stroke-dasharray="none" marker-end="url(#arr)"/>
  <rect x="142" y="106" width="80" height="14" rx="3" fill="#0f1f0f" opacity="0.85"/>
  <text x="182" y="117" text-anchor="middle" font-size="8" font-family="monospace" fill="#35D07F">createEscrow()</text>

  <!-- Escrow -> B: releaseMilestone -->
  <path d="M 285 175 Q 310 140 280 122" stroke="#35D07F" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>
  <rect x="285" y="140" width="90" height="14" rx="3" fill="#0f1f0f" opacity="0.85"/>
  <text x="330" y="151" text-anchor="middle" font-size="8" font-family="monospace" fill="#35D07F">releaseMilestone()</text>

  <!-- B -> Escrow: submitMilestone -->
  <path d="M 280 105 Q 260 130 285 190" stroke="#6aaa88" stroke-width="1" fill="none" stroke-dasharray="4,3" marker-end="url(#arr2)"/>
  <rect x="255" y="148" width="82" height="14" rx="3" fill="#0f1f0f" opacity="0.85"/>
  <text x="296" y="158" text-anchor="middle" font-size="8" font-family="monospace" fill="#6aaa88">submitMilestone()</text>

  <!-- Oracle -> Escrow -->
  <path d="M 120 220 L 135 210" stroke="#2ab870" stroke-width="1.2" fill="none" marker-end="url(#arr2)"/>
  <text x="108" y="197" text-anchor="middle" font-size="8" font-family="monospace" fill="#2ab870">sig</text>

  <!-- Escrow -> Reputation -->
  <path d="M 210 245 L 210 295" stroke="#2ab870" stroke-width="1" fill="none" stroke-dasharray="4,3" marker-end="url(#arr2)"/>
  <text x="240" y="277" text-anchor="middle" font-size="8" font-family="monospace" fill="#2ab870">recordOutcome()</text>
</svg>
