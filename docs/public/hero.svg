<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 140" fill="none">
  <!-- Requester -->
  <rect x="8" y="36" width="120" height="68" rx="10" stroke="#c8c6c0" stroke-width="1.25" fill="transparent"/>
  <text x="68" y="64" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" font-weight="600" fill="#b0aea8">Requester</text>
  <text x="68" y="82" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#7a7a75">locks funds</text>

  <!-- Arrow 1 -->
  <path d="M 136 70 H 168" stroke="#c8c6c0" stroke-width="1.25" stroke-linecap="round"/>
  <path d="M 162 66 L 170 70 L 162 74" stroke="#1a6b4a" stroke-width="1.25" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- Escrow -->
  <rect x="176" y="28" width="148" height="84" rx="12" fill="#141413"/>
  <circle cx="250" cy="58" r="9" stroke="#3d9b72" stroke-width="1.5" fill="none"/>
  <rect x="246" y="62" width="8" height="6" rx="1" fill="#3d9b72"/>
  <text x="250" y="92" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" font-weight="600" fill="#f2f1ed">Escrow</text>

  <!-- Arrow 2 -->
  <path d="M 332 70 H 364" stroke="#c8c6c0" stroke-width="1.25" stroke-linecap="round"/>
  <path d="M 358 66 L 366 70 L 358 74" stroke="#1a6b4a" stroke-width="1.25" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- Fulfiller -->
  <rect x="372" y="36" width="120" height="68" rx="10" stroke="#c8c6c0" stroke-width="1.25" fill="transparent"/>
  <text x="432" y="64" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" font-weight="600" fill="#b0aea8">Fulfiller</text>
  <text x="432" y="82" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#7a7a75">delivers work</text>

  <!-- Arrow 3 -->
  <path d="M 500 70 H 532" stroke="#c8c6c0" stroke-width="1.25" stroke-linecap="round"/>
  <path d="M 526 66 L 534 70 L 526 74" stroke="#1a6b4a" stroke-width="1.25" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- Reputation -->
  <rect x="540" y="44" width="172" height="52" rx="10" stroke="#c8c6c0" stroke-width="1.25" fill="transparent"/>
  <text x="626" y="68" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" font-weight="600" fill="#b0aea8">ERC-8004</text>
  <text x="626" y="84" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#7a7a75">reputation</text>

  <text x="250" y="18" text-anchor="middle" font-family="system-ui,sans-serif" font-size="8" fill="#7a7a75">milestone escrow on Celo</text>
</svg>
